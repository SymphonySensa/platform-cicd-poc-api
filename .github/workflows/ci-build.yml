name: Build & Attest

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write       # keyless Cosign signing via GitHub OIDC
  packages: write
  security-events: write

jobs:
  build-and-attest:
    name: Build, SBOM, Sign, Scan
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, no push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: platform-poc-api:${{ github.sha }}
          build-args: APP_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (Syft / CycloneDX 1.6)
        uses: anchore/sbom-action@v0
        with:
          image: platform-poc-api:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-${{ github.sha }}.cdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Grype
        uses: anchore/scan-action/download-grype@v4

      - name: Vulnerability scan (Grype)
        id: grype
        run: |
          grype sbom:sbom.cdx.json \
            --output sarif \
            --file grype.sarif \
            --fail-on high
        continue-on-error: true

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: grype.sarif

      - name: Fail if Grype found high/critical
        if: steps.grype.outcome == 'failure'
        run: exit 1

      - name: Sign SBOM (keyless, GitHub OIDC)
        run: |
          cosign sign-blob \
            --yes \
            --output-signature sbom.cdx.json.sig \
            --output-certificate sbom.cdx.json.pem \
            sbom.cdx.json

      - name: Upload signed SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-signed-${{ github.sha }}
          path: |
            sbom.cdx.json
            sbom.cdx.json.sig
            sbom.cdx.json.pem
