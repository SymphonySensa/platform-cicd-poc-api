apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-poc-api.fullname" . }}
  labels:
    {{- include "platform-poc-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "platform-poc-api.selectorLabels" . | nindent 4 }}
---
# Stable service — Argo Rollouts routes non-canary traffic here
apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-poc-api.fullname" . }}-stable
  labels:
    {{- include "platform-poc-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "platform-poc-api.selectorLabels" . | nindent 4 }}
---
# Canary service — Argo Rollouts routes canary-weighted traffic here
apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-poc-api.fullname" . }}-canary
  labels:
    {{- include "platform-poc-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "platform-poc-api.selectorLabels" . | nindent 4 }}
